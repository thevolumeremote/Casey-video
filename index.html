<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>For Casey</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
      background: black;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 2s ease;
    }

    .fade-in {
      opacity: 1;
    }
  </style>
</head>

<body>

<div class="container">
  <iframe
    id="video"
    src="https://www.youtube.com/embed/xg-e5QstxSM?autoplay=1&mute=1&loop=1&playlist=xg-e5QstxSM&controls=1&modestbranding=1&rel=0&playsinline=1"
    allow="autoplay; fullscreen; encrypted-media"
    allowfullscreen>
  </iframe>
</div>

<script>
  window.addEventListener("load", () => {
    setTimeout(() => {
      document.getElementById("video").classList.add("fade-in");
    }, 300); // slight delay for smoother feel
  });
</script>

</body>
</html>
