<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>For Casey</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    iframe {
      position: absolute;
      width: 100%;
      height: 100%;
      border: none;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      font-family: serif;
      background: black;
      transition: opacity 2s ease;
      z-index: 2;
    }

    .fade-out {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- Opening text -->
  <div id="overlay" class="overlay">
    Welcome to the museum in my mind…
  </div>

  <!-- YouTube embed -->
  <iframe
    src="https://www.youtube.com/embed/xg-e5QstxSM?autoplay=1&mute=1&loop=1&playlist=xg-e5QstxSM&controls=0"
    allow="autoplay; fullscreen">
  </iframe>

</div>

<script>
  setTimeout(() => {
    document.getElementById("overlay").classList.add("fade-out");
  }, 2000);
</script>

</body>
</html>
